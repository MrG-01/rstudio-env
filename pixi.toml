[workspace]
authors = ["Matthew Gruner <mgruner01@unr.edu>"]
channels = ["conda-forge","bioconda"]
name = "rstudio-env"
platforms = ["osx-64","win-64"]
version = "0.1.0"

[tasks]
rstudio = "open -a RStudio ."

[dependencies]
r-base = ">=4.4.0,<4.5"
r-tidyverse = ">=2.0.0,<3"
r-readxl = ">=1.5.0,<2"
snakemake = ">=9.23.0,<10"
